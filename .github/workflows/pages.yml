name: Build & Deploy GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint each package + landing
        run: |
          npm run lint --workspace=packages/baeknyeon
          npm run lint --workspace=packages/postoffice-busan
          npm run lint --workspace=landing

      - name: Test (where available)
        run: npm run test --workspace=packages/baeknyeon

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build all (landing + packages)
        run: npm run build:all

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
